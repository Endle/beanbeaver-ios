name: iOS build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build xcframework + app (simulator)
    runs-on: macos-15
    env:
      # Match the local dev toolchain; bump when you move off stable.
      RUST_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4

      # Pin an Xcode so the available iOS SDK is predictable. Adjust the version
      # to whatever the runner image provides (see the "Xcode" line in the job's
      # setup logs); the app only needs an SDK >= deployment target (iOS 17.0).
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }} + iOS targets
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim
          rustc --version

      # Cargo registry/git + build outputs. Keyed on Cargo.lock so it busts when
      # deps change.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      # `ort` downloads a prebuilt libonnxruntime.a here; caching it avoids a
      # network fetch every run (build-xcframework.sh reads from this path).
      - name: Cache ONNX Runtime
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ort.pyke.io
          key: ort-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ort-${{ runner.os }}-

      # Debug profile: faster than release and enough to prove the build is green.
      - name: Build BBReceiptFFI.xcframework
        run: PROFILE=debug ./build-xcframework.sh

      # ARCHS=arm64: the generic simulator destination otherwise builds every
      # valid arch (arm64 + x86_64), but the xcframework ships only the arm64
      # simulator slice (the runner is Apple Silicon), so drop x86_64.
      - name: Build app (iOS Simulator)
        run: |
          xcodebuild build \
            -project BeanBeaverScan/BeanBeaverScan.xcodeproj \
            -scheme BeanBeaverScan \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO

  # Runs the app on a booted simulator: proves the xcframework links AND loads at
  # runtime (uniffi checksum/contract, ORT init, model loading) — things the
  # compile-only job above can't catch. `needs: build` serializes so this job
  # restores the warm cargo/ort caches build just saved (its Rust build is then a
  # near-no-op) and never races the cache upload.
  simulator:
    name: Simulator smoke + E2E
    needs: build
    runs-on: macos-15
    env:
      RUST_TOOLCHAIN: stable
      BID: com.beanbeaver.BeanBeaverScan
      SCHEME: BeanBeaverScan
      # device_sim live mode is slow (~4s/scan + app launch), and it exists to
      # prove the on-device path works — not to grade the whole corpus (that's
      # done fast on Linux in beanbeaver-core's receipt-core E2E). So run only a
      # representative handful here. Bump if you want more on-device coverage.
      LIVE_SIM_MAX: "2"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Install Rust + iOS targets
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Cache ONNX Runtime
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ort.pyke.io
          key: ort-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ort-${{ runner.os }}-

      - name: Build BBReceiptFFI.xcframework
        run: PROFILE=debug ./build-xcframework.sh

      - name: Boot a simulator
        id: sim
        run: |
          # The scripts hardcode "iPhone 17 Pro"; the runner image won't have it,
          # so pick the first available iPhone on whatever runtime is installed.
          UDID=$(xcrun simctl list devices available --json | python3 -c '
          import json, sys
          d = json.load(sys.stdin)["devices"]
          ids = [dev["udid"] for rt in d for dev in d[rt]
                 if dev.get("isAvailable") and "iPhone" in dev["name"]]
          print(ids[0] if ids else "")')
          [ -n "$UDID" ] || { echo "no iPhone simulator available"; xcrun simctl list devices; exit 1; }
          echo "Booting $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Build & install app
        run: |
          xcodebuild build \
            -project BeanBeaverScan/BeanBeaverScan.xcodeproj \
            -scheme "$SCHEME" -configuration Debug \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=YES
          APP=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name '*.app' | head -1)
          [ -n "$APP" ] || { echo "built .app not found"; exit 1; }
          xcrun simctl install "${{ steps.sim.outputs.udid }}" "$APP"

      # Pick up to LIVE_SIM_MAX fixtures to run on-device, preferring ones with a
      # committed expected.json (so the accuracy step has something to grade),
      # sorted for determinism. Written to selected.txt, shared by the two steps
      # below (same job -> same workspace).
      - name: Select live fixtures
        run: |
          python3 - "$LIVE_SIM_MAX" <<'PY'
          import glob, os, sys
          n = int(sys.argv[1])
          jpgs = sorted(glob.glob("tests/receipts_e2e/*.jpg"))
          graded = [j for j in jpgs if os.path.exists(j[:-len(".jpg")] + ".expected.json")]
          rest = [j for j in jpgs if j not in graded]
          sel = (graded + rest)[:n]
          assert sel, "no *.jpg fixtures under tests/receipts_e2e/"
          open("selected.txt", "w").write("\n".join(sel) + "\n")
          print(f"selected {len(sel)}/{len(jpgs)} fixture(s) for live mode:")
          for j in sel:
              print("  " + j + ("" if j in graded else "  (no expected.json — smoke only)"))
          PY

      # Smoke: feed the selected fixture(s) through the real on-device pipeline
      # via -autoRunBatch and assert the app produced results with no scan errors.
      # This is the runtime gate — it fails on a dyld/uniffi/ORT/model failure.
      - name: Smoke — run batch on device
        env:
          UDID: ${{ steps.sim.outputs.udid }}
        run: |
          CONT=$(xcrun simctl get_app_container "$UDID" "$BID" data)
          IN="$CONT/Documents/batch_in"; OUT="$CONT/Documents/batch_out.json"
          rm -rf "$IN"; mkdir -p "$IN"; rm -f "$OUT"
          xargs -I{} cp {} "$IN/" < selected.txt
          xcrun simctl launch "$UDID" "$BID" -autoRunBatch >/dev/null
          for _ in $(seq 1 120); do [ -f "$OUT" ] && break; sleep 2; done
          [ -f "$OUT" ] || { echo "::error::timed out waiting for batch_out.json"; exit 1; }
          cp "$OUT" batch_out.json
          python3 - batch_out.json <<'PY'
          import json, sys
          res = json.load(open(sys.argv[1])).get("results", [])
          assert res, "no results in batch_out.json"
          for r in res:
              line = (f"  {r['name']}: {r.get('merchant','?')} {r.get('date','?')} "
                      f"${r.get('total','?')} ({len(r.get('items',[]))} items, "
                      f"{int(r.get('wallMs',0))}ms)")
              print(line + (f"  ERROR: {r['error']}" if r.get("error") else ""))
          bad = [r["name"] for r in res if r.get("error")]
          assert not bad, f"on-device scan error(s): {bad}"
          print(f"OK: {len(res)} scan(s) ran on device, no errors")
          PY

      # Accuracy: grade the same batch_out.json against ground-truth fixtures,
      # but only for the fixtures we actually ran on-device (selected.txt). If a
      # selected fixture has no *.expected.json (only a .template) this skips
      # green; add one and it starts enforcing merchant/date/total/items.
      - name: E2E — grade against expected.json
        run: |
          python3 - <<'PY'
          import json, os
          suf = ".expected.json"
          m = {}
          for jpg in open("selected.txt").read().split():
              exp = jpg[:-len(".jpg")] + suf
              if os.path.exists(exp):
                  m[os.path.basename(jpg)[:-len(".jpg")]] = exp
          if not m:
              print("::notice::No *.expected.json for the selected fixture(s) — "
                    "skipping accuracy grading. Copy the .template to <stem>.expected.json.")
              raise SystemExit(0)
          json.dump(m, open("manifest.json", "w"), indent=2)
          print("grading:", list(m))
          PY
          [ -f manifest.json ] || exit 0
          python3 scripts/compare-e2e.py --results batch_out.json --manifest manifest.json
